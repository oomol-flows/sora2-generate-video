inputs_def:
  - handle: image_url
    description: Web URL of the source image to animate
    json_schema:
      type: string
      format: uri
    nullable: false

  - handle: prompt
    description: Text description of how the image should animate
    json_schema:
      type: string
      ui:widget: text
    nullable: false

  - group: Video Settings
    collapsed: true

  - handle: resolution
    description: Output video resolution (auto matches source image)
    json_schema:
      enum:
        - auto
        - 720p
        - 1080p
      ui:options:
        labels:
          - Auto
          - 720p
          - 1080p
    value: auto
    nullable: true

  - handle: aspect_ratio
    description: Video aspect ratio (auto matches source image)
    json_schema:
      enum:
        - auto
        - 9:16
        - 16:9
      ui:options:
        labels:
          - Auto
          - 9:16 (Portrait)
          - 16:9 (Landscape)
    value: auto
    nullable: true

  - handle: duration
    description: Video length in seconds (4, 8, or 12)
    json_schema:
      enum:
        - 4
        - 8
        - 12
      ui:options:
        labels:
          - 4 seconds
          - 8 seconds
          - 12 seconds
    value: 4
    nullable: true

outputs_def:
  - handle: video_url
    description: "Web URL of the generated video"
    json_schema:
      type: string
      format: uri
    nullable: false

  - handle: video_path
    description: "Local file path to the downloaded video"
    json_schema:
      type: string
    nullable: false

  - group: Video Information
    collapsed: true

  - handle: video_id
    description: "Unique identifier for the generated video"
    json_schema:
      type: string
    nullable: false

  - handle: width
    description: "Video width in pixels"
    json_schema:
      type: number
    nullable: false

  - handle: height
    description: "Video height in pixels"
    json_schema:
      type: number
    nullable: false

  - handle: fps
    description: "Frames per second"
    json_schema:
      type: number
    nullable: false

  - handle: actual_duration
    description: "Actual video duration in seconds"
    json_schema:
      type: number
    nullable: false

  - handle: num_frames
    description: "Total number of frames"
    json_schema:
      type: number
    nullable: false

  - group: Additional Media
    collapsed: true

  - handle: thumbnail_url
    description: "Web URL of the video thumbnail preview"
    json_schema:
      type: string
    nullable: false

executor:
  name: nodejs
  options:
    entry: index.ts
    spawn: false

title: "Sora2 Image to Video"
icon: ":carbon:video:"
description: "Animates still images into videos using the Sora2 AI model"
